# Alembic Configuration File
# This file is consumed by the `alembic` CLI.
# The `sqlalchemy.url` is overridden at runtime by env/config.py
# so you do not need to modify it here.

[alembic]
script_location = alembic
prepend_sys_path = .

# Alembic uses this pattern to name auto-generated migration files.
# e.g.: 20241201_143022_add_job_table.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Timezone for timestamps in migration file names
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
